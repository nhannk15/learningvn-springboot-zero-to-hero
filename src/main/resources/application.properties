spring.application.name=learningvn

# Context Server Configuration
server.port=8080

# MySQL DataSource Configuration
# spring.datasource.url=jdbc:mysql://localhost:3306/studentsmanagement
# spring.datasource.username=root
# spring.datasource.password=21012006
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 DataSource Configuration
# spring.datasource.url=jdbc:h2:file:./mydatabase
spring.datasource.url=jdbc:h2:mem:mydatabase
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Logging Configuration
logging.level.root=DEBUG
logging.level.com.example.learningvn.controller=DEBUG
logging.level.com.example.learningvn.controller.StudentController=TRACE
logging.file.name=app.log
logging.file.path=./logs

# camelCase Configuration
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Spring Security Configuration
spring.security.user.name=khacnhan
spring.security.user.password=21012006
spring.security.user.roles=ADMIN

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGeneration12345
jwt.expiration=86400000

